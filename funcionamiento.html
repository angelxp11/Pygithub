<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visualizador MCNtiny</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

textarea{
    width:100%;
    height:200px;
    padding:10px;
    font-family: monospace;
    border-radius:8px;
    border:1px solid #ccc;
    resize:vertical;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

iframe{
    width:100%;
    height:400px;
    margin-top:20px;
    border:1px solid #ccc;
    border-radius:8px;
    background:white;
}
</style>
</head>

<body>

<div class="container">

<h2>Visualizador de Código MCNtiny</h2>

<textarea id="codigo" placeholder="Pega aquí tu código..."></textarea>

<br>
<button onclick="visualizar()">Visualizar</button>

<iframe id="preview"></iframe>

</div>

<script>
function visualizar(){
    const codigo = document.getElementById("codigo").value;
    const iframe = document.getElementById("preview");

    iframe.srcdoc = codigo;
}
</script>

</body>
</html>
